version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: salespulse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass strongredispassword
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/salespulse_db
      - REDIS_URL=redis://:strongredispassword@redis:6379/0
      - SECRET_KEY=yoursecretjwtkeyforauthsuperlongandcomplex
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=postgresql://postgres:supersecretpassword@db:5432/salespulse_db
      - REDIS_URL=redis://:strongredispassword@redis:6379/0
      - SECRET_KEY=yoursecretjwtkeyforauthsuperlongandcomplex
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1

volumes:
  postgres_data:
